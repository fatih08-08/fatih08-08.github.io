<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seyfi Bird Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2980b9; font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
        canvas { display: block; touch-action: none; position: absolute; top: 0; left: 0; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); z-index: 10; backdrop-filter: blur(8px);
        }
        
        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 18px 50px; font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(211, 84, 0, 0.4);
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
        }

        .title { 
            font-size: 56px; margin-bottom: 10px; font-weight: 900; 
            background: linear-gradient(#f1c40f, #f39c12);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.3));
        }

        #hud {
            position: absolute; top: 30px; width: 100%; text-align: center;
            font-size: 48px; font-weight: 900; display: none; z-index: 5;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none;
        }

        .char-select { display: flex; gap: 20px; margin: 25px 0; justify-content: center; }
        
        .char-card { 
            background: rgba(255,255,255,0.1); border-radius: 20px; 
            cursor: pointer; border: 3px solid rgba(255,255,255,0.1); transition: 0.3s;
            width: 90px; height: 90px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .char-card.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }
        .char-card canvas { position: relative; display: block; }
        
        #high-score { font-size: 20px; opacity: 0.9; margin-bottom: 15px; color: #f1c40f; }
    </style>
</head>
<body>
    <div id="hud">0</div>
    <div id="ui-layer">
        <div class="menu-card">
            <div class="title" id="menu-title">Seyfi Bird</div>
            <div id="high-score">EN İYİ: 0</div>
            <div style="font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7;">Karakterini Seç</div>
            <div class="char-select">
                <div class="char-card" id="card-seyfi" onclick="selectChar('seyfi')">
                    <canvas id="previewSeyfi" width="90" height="90"></canvas>
                </div>
                <div class="char-card" id="card-karga" onclick="selectChar('karga')">
                    <canvas id="previewKarga" width="90" height="90"></canvas>
                </div>
            </div>
            <button class="btn" id="startBtn" onclick="startGame()" style="display:none;">ÇALIŞMAYA BAŞLA</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-layer');
    const hud = document.getElementById('hud');
    const highScoreEl = document.getElementById('high-score');
    const startBtn = document.getElementById('startBtn');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const soundStart = new Audio('basla.opus');
    const soundScore = new Audio('gecis.opus');
    const soundFail = new Audio('kaybetme.opus');

    let gravity = 0.25;
    let velocity = 0;
    let birdY = canvas.height / 2;
    let birdX = 85;
    let pipeGap = 220; 
    let pipes = [];
    let score = 0;
    let highScore = localStorage.getItem('artvinHouseScore') || 0;
    let gameActive = false;
    let bgScroll = 0; 
    let selectedCharacter = 'seyfi';

    highScoreEl.innerText = "EN İYİ: " + highScore;

    function selectChar(char) {
        selectedCharacter = char;
        document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('card-' + char).classList.add('selected');
        startBtn.style.display = 'inline-block';
    }

    function drawVillageScene() {
        let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
        sky.addColorStop(0, "#1a5276"); sky.addColorStop(0.5, "#5dade2"); sky.addColorStop(1, "#27ae60");
        ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, canvas.height);

        bgScroll -= gameActive ? 2 : 0.8;
        if (bgScroll <= -canvas.width) bgScroll = 0;

        for (let i = 0; i < 2; i++) {
            let xPos = bgScroll + (i * canvas.width);
            ctx.fillStyle = "#145a32";
            ctx.beginPath();
            ctx.moveTo(xPos - 100, canvas.height);
            ctx.lineTo(xPos + canvas.width/2, canvas.height - 350);
            ctx.lineTo(xPos + canvas.width + 100, canvas.height);
            ctx.fill();

            ctx.fillStyle = "#1e8449";
            ctx.beginPath();
            ctx.moveTo(xPos, canvas.height);
            ctx.bezierCurveTo(xPos + canvas.width/4, canvas.height - 180, xPos + 3*canvas.width/4, canvas.height - 180, xPos + canvas.width, canvas.height);
            ctx.fill();
            drawHouse(xPos + 150, canvas.height - 130);
            drawHouse(xPos + canvas.width - 250, canvas.height - 150);
        }
    }

    function drawHouse(x, y) {
        ctx.fillStyle = "#5d4037"; ctx.fillRect(x, y, 50, 45);
        ctx.fillStyle = "#a93226";
        ctx.beginPath(); ctx.moveTo(x-10, y); ctx.lineTo(x+25, y-30); ctx.lineTo(x+60, y); ctx.fill();
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(x+8, y+10, 12, 12);
    }

    function drawSeyfiUltra(x, y, targetCtx = ctx) {
        const s = 0.35; 
        targetCtx.save();
        targetCtx.translate(x, y);
        if(gameActive && targetCtx === ctx) targetCtx.rotate(velocity * 0.05);
        
        targetCtx.fillStyle = "#2d3e33"; targetCtx.fillRect(-35*s, -25*s, 70*s, 80*s);
        targetCtx.fillStyle = "#34493d"; targetCtx.fillRect(-30*s, -20*s, 60*s, 70*s);
        targetCtx.fillStyle = "#ffdbac"; targetCtx.fillRect(-12*s, -62*s, 24*s, 38*s);
        targetCtx.fillStyle = "#121212"; targetCtx.fillRect(-15*s, -68*s, 30*s, 16*s);
        targetCtx.fillStyle = "#d4a780"; targetCtx.fillRect(-55*s, -48*s, 65*s, 20*s); 
        targetCtx.fillStyle = "#ffdbac"; targetCtx.fillRect(-20*s, -58*s, 75*s, 20*s);
        targetCtx.fillStyle = "#0a0a0a"; targetCtx.fillRect(-35*s, 55*s, 70*s, 40*s);
        targetCtx.restore();
    }

    function drawKarga(x, y, targetCtx = ctx) {
        const p = 4.5;
        targetCtx.save();
        targetCtx.translate(x, y);
        targetCtx.fillStyle = "#1a1a1a";
        targetCtx.fillRect(-4*p, -2*p, 8*p, 6*p);
        targetCtx.fillRect(-2*p, -6*p, 5*p, 5*p);
        targetCtx.fillStyle = "#ffcc00";
        targetCtx.fillRect(3*p, -4*p, 3*p, 2*p);
        targetCtx.restore();
    }

    function drawMakas(x, y, height, isTop) {
        ctx.save();
        isTop ? (ctx.translate(x + 30, 0), ctx.scale(1.5, 1.5)) : (ctx.translate(x + 30, canvas.height), ctx.scale(1.5, -1.5));
        ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 12; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-20, height/1.5); ctx.moveTo(0, 0); ctx.lineTo(20, height/1.5); ctx.stroke();
        ctx.strokeStyle = "#c0392b"; ctx.lineWidth = 18; 
        ctx.beginPath(); ctx.arc(-22, 10, 18, 0, Math.PI * 2); ctx.arc(22, 10, 18, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
    }

    function startGame() {
        soundStart.play().catch(()=>{}); 
        gameActive = true; 
        ui.style.display = 'none'; 
        hud.style.display = 'block';
        birdY = canvas.height / 2; velocity = 0; pipes = []; score = 0;
        hud.innerText = "0";
    }

    function gameOver() {
        if (gameActive) soundFail.play().catch(()=>{});
        gameActive = false;
        if(score > highScore) { highScore = score; localStorage.setItem('artvinHouseScore', highScore); }
        ui.style.display = 'flex';
        highScoreEl.innerText = "EN İYİ: " + highScore;
        document.getElementById('menu-title').innerText = "BOK YİYAN";
        document.getElementById('startBtn').innerText = "TEKRAR DENE";
        drawPreviews(); // Menüye dönünce önizlemeleri tazele
    }

    function update() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        drawVillageScene();
        if (gameActive) {
            velocity += gravity; birdY += velocity;
            if(selectedCharacter === 'seyfi') drawSeyfiUltra(birdX, birdY);
            else drawKarga(birdX, birdY);
            pipes.forEach((p) => {
                p.x -= 4.8;
                drawMakas(p.x, 0, p.top, true);
                drawMakas(p.x, 0, canvas.height - (p.top + pipeGap), false);
                if (birdX + 18 > p.x && birdX - 18 < p.x + 60) {
                    if (birdY - 25 < p.top || birdY + 35 > p.top + pipeGap) gameOver();
                }
            });
            if (pipes.length > 0 && pipes[0].x < -100) { 
                pipes.shift(); score++; 
                hud.innerText = score;
                soundScore.play().catch(()=>{});
            }
            if (birdY > canvas.height + 50 || birdY < -100) gameOver();
        } else {
            if(selectedCharacter === 'seyfi') drawSeyfiUltra(birdX, birdY);
            else drawKarga(birdX, birdY);
        }
        requestAnimationFrame(update);
    }

    function drawPreviews() {
        const sCanvas = document.getElementById('previewSeyfi');
        const kCanvas = document.getElementById('previewKarga');
        const sCtx = sCanvas.getContext('2d');
        const kCtx = kCanvas.getContext('2d');
        
        sCtx.clearRect(0,0,90,90);
        kCtx.clearRect(0,0,90,90);

        // Zorunlu merkezleme: Canvas'ın tam merkezine (45, 45) çizim yapıyoruz
        drawSeyfiUltra(45, 40, sCtx); 
        drawKarga(45, 45, kCtx);
    }

    window.addEventListener('pointerdown', (e) => { 
        if(gameActive) { velocity = -6.8; e.preventDefault(); }
    });

    setInterval(() => { 
        if(gameActive) {
            let minH = 120; 
            let space = canvas.height - pipeGap - (minH * 2);
            let topH = Math.floor(Math.random() * space) + minH;
            pipes.push({ x: canvas.width, top: topH });
        }
    }, 1500);

    // İlk yüklemede ve pencere boyutlandığında karakterleri ortala
    window.onload = () => {
        drawPreviews();
        update();
    };
</script>
</body>
