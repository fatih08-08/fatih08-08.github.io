<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Karga İçecek Doldurma Oyunu</title>
    <!-- Harici CSS Dosyası -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🦅 Karga İçecek Oyunu</h1>
    <div class="level-indicator" id="levelText">Bölüm 1</div>

    <!-- Karga Maskotu ve Konuşma Balonu -->
    <div class="crow-container">
        <div class="speech-bubble" id="speech">Tüpleri doldur!</div>
        <svg class="crow-svg" id="crowSvg" width="78" height="68" viewBox="0 0 80 70">
            <ellipse cx="40" cy="48" rx="22" ry="16" fill="#1a1a1a"/>
            <ellipse cx="36" cy="52" rx="16" ry="9" fill="#111" transform="rotate(-10 36 52)"/>
            <ellipse cx="45" cy="50" rx="14" ry="7" fill="#222" transform="rotate(8 45 50)"/>
            <ellipse cx="52" cy="30" rx="14" ry="13" fill="#1a1a1a"/>
            <circle cx="57" cy="27" r="4" fill="#fff"/>
            <circle cx="58" cy="27" r="2.5" fill="#333"/>
            <circle cx="59" cy="26" r="1" fill="#111"/>
            <circle cx="59.5" cy="26" r="0.5" fill="#fff"/>
            <path d="M64 30 L74 28 L66 34 Z" fill="#e8a020"/>
            <line x1="33" y1="64" x2="28" y2="70" stroke="#555" stroke-width="2"/>
            <line x1="33" y1="64" x2="33" y2="70" stroke="#555" stroke-width="2"/>
            <line x1="33" y1="64" x2="38" y2="70" stroke="#555" stroke-width="2"/>
            <line x1="45" y1="64" x2="40" y2="70" stroke="#555" stroke-width="2"/>
            <line x1="45" y1="64" x2="45" y2="70" stroke="#555" stroke-width="2"/>
            <line x1="45" y1="64" x2="50" y2="70" stroke="#555" stroke-width="2"/>
            <line x1="33" y1="63" x2="45" y2="63" stroke="#333" stroke-width="3"/>
        </svg>
    </div>

    <!-- Skor ve Hamle Paneli -->
    <div class="score-bar">
        <span id="scoreText">Skor: 0</span> &nbsp;|&nbsp;
        <span class="moves-left" id="movesText">Hamle: 0</span>
    </div>

    <!-- Kontrol Butonları -->
    <div class="controls">
        <button class="btn" onclick="undoMove()">↩ Geri Al</button>
        <button class="btn primary" onclick="newGame()">🔄 Yeni Oyun</button>
        <button class="btn" onclick="showHint()">💡 İpucu</button>
    </div>

    <!-- Dinamik Oyun Alanı (Tüpler buraya eklenecek) -->
    <div class="game-area" id="gameArea"></div>

    <!-- KAZANMA EKRANI (WIN OVERLAY) -->
    <div class="win-overlay" id="winOverlay">
        <div class="overlay-box">
            <div class="stars" id="winStars">⭐⭐⭐</div>
            <h2>Tebrikler! 🦅</h2>
            <p id="winMsg">Karga çok mutlu!</p>
            <button class="btn primary" onclick="nextLevel()">Sonraki Bölüm ➜</button>
        </div>
    </div>

    <!-- KAYBETME EKRANI (LOSE OVERLAY) -->
    <div class="lose-overlay" id="loseOverlay">
        <div class="overlay-box">
            <h2 style="color:#e55;">Takıldın! 😅</h2>
            <p>Tekrar dene!</p>
            <button class="btn primary" onclick="newGame()">🔄 Tekrar Oyna</button>
        </div>
    </div>
<footer style="
    background-color: #1a1a1a; 
    color: #a0a0a0; 
    text-align: center; 
    padding: 20px 0; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    border-top: 1px solid #2d2d2d;
">
    <a href="https://www.instagram.com/fatih_elektrik_elektronik>Fatih Altunkaya</a>
</footer>
    <!-- Harici JavaScript Dosyası -->
    <script src="script.js"></script>
</body>
</html>
