<!DOCTYPE html>
<html>
<head>
  <title>Kuş Birleştirme</title>
  <style>
    body { text-align:center; font-family:sans-serif; }
    .kare {
      width: 80px; height: 80px; 
      display:inline-flex; 
      justify-content:center; 
      align-items:center; 
      border:1px solid #333; 
      font-size:40px;
      margin:5px;
    }
  </style>
</head>
<body>
  <h1>Kuş Birleştirme</h1>
  <div id="oyun">
    <div class="kare" onclick="birles(this)">🐦</div>
    <div class="kare" onclick="birles(this)">🐦</div>
  </div>

  <script>
    function birles(el) {
      let diger = document.querySelectorAll(".kare");
      if (diger[0].innerText === diger[1].innerText) {
        if (diger[0].innerText === "🐦") {
          diger[0].innerText = "🐤"; // Serçe
          diger[1].innerText = "";   // Boş
        }
      }
    }
  </script>
</body>
</html>
